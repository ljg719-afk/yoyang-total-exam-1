<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>요양보호사 1차 종합 모의고사</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕",sans-serif;min-height:100vh;padding-bottom:80px}
.container{max-width:600px;margin:0 auto;padding:16px}
.header{text-align:center;padding:24px 0 16px}
.header h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.4}
.header p{font-size:13px;color:#94a3b8;margin-top:6px}
.card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #334155}
.card h2{font-size:15px;color:#60a5fa;margin-bottom:12px;font-weight:700}
.input-wrap{margin-bottom:12px}
.input-wrap label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.input-wrap input{width:100%;padding:14px 16px;background:#0f172a;border:2px solid #334155;border-radius:12px;color:#e2e8f0;font-size:16px;outline:none;transition:border-color .2s}
.input-wrap input:focus{border-color:#60a5fa}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:#334155;color:#e2e8f0;margin-top:8px}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}
.section-title{background:#1e3a5f;border-radius:12px;padding:14px 16px;margin:20px 0 12px;font-size:14px;font-weight:700;color:#93c5fd;text-align:center;border:1px solid #2563eb33}
.q-card{background:#1e293b;border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid #334155}
.q-num{display:inline-block;background:#3b82f6;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.q-text{font-size:15px;line-height:1.7;color:#e2e8f0;margin-bottom:14px;word-break:keep-all}
.opt-list{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:flex-start;gap:10px;padding:14px;background:#0f172a;border:2px solid #334155;border-radius:12px;cursor:pointer;transition:all .2s;text-align:left;font-size:14px;line-height:1.6;color:#cbd5e1;word-break:keep-all}
.opt-btn:active{transform:scale(.98)}
.opt-btn.selected{border-color:#3b82f6;background:#1e3a5f;color:#fff}
.opt-circle{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:2px solid #475569;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#94a3b8;margin-top:1px;transition:all .2s}
.opt-btn.selected .opt-circle{background:#3b82f6;border-color:#3b82f6;color:#fff}
.progress-bar{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);z-index:100;transition:width .3s}
.progress-info{text-align:center;font-size:12px;color:#64748b;margin-bottom:12px}
.submit-area{padding:20px 0}
.result-header{text-align:center;padding:20px 0}
.score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:32px;font-weight:800}
.score-circle.pass{background:#052e16;border:3px solid #22c55e;color:#22c55e}
.score-circle.fail{background:#450a0a;border:3px solid #ef4444;color:#ef4444}
.score-circle small{font-size:12px;font-weight:400;margin-top:2px}
.result-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-size:14px;font-weight:700;margin-bottom:8px}
.result-badge.pass{background:#052e16;color:#22c55e;border:1px solid #22c55e}
.result-badge.fail{background:#450a0a;color:#ef4444;border:1px solid #ef4444}
.stat-row{display:flex;justify-content:center;gap:24px;margin:12px 0}
.stat-item{text-align:center}
.stat-item .num{font-size:20px;font-weight:700}
.stat-item .lbl{font-size:11px;color:#94a3b8;margin-top:2px}
.correct-mark{color:#22c55e}
.wrong-mark{color:#ef4444}
.r-q{background:#1e293b;border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid #334155}
.r-q .opt-row{padding:10px 14px;border-radius:10px;margin:4px 0;font-size:14px;line-height:1.6;word-break:keep-all}
.r-q .opt-row.is-answer{background:#052e16;border:1px solid #22c55e}
.r-q .opt-row.is-wrong{background:#450a0a;border:1px solid #ef4444}
.r-q .opt-row.is-answer::after{content:" ✅ 정답";font-size:12px;font-weight:700;color:#22c55e}
.r-q .opt-row.is-wrong::after{content:" ❌ 내 답";font-size:12px;font-weight:700;color:#ef4444}
.explain-box{background:#0c1a2e;border-left:3px solid #60a5fa;padding:14px;border-radius:0 10px 10px 0;margin-top:12px;font-size:13px;line-height:1.8;color:#94a3b8;word-break:keep-all}
.explain-box b{color:#60a5fa}
.unanswered-badge{display:inline-block;background:#92400e;color:#fbbf24;font-size:11px;padding:2px 8px;border-radius:8px;margin-left:6px}
.lock-screen{text-align:center;padding:40px 20px}
.lock-screen .icon{font-size:48px;margin-bottom:16px}
.lock-input{width:200px;padding:14px;background:#0f172a;border:2px solid #334155;border-radius:12px;color:#e2e8f0;font-size:20px;text-align:center;outline:none;letter-spacing:8px;margin:16px auto;display:block}
.lock-input:focus{border-color:#60a5fa}
.lock-msg{font-size:13px;color:#94a3b8;margin-top:8px}
.admin-panel{max-width:600px;margin:0 auto;padding:16px}
.adm-section{background:#1e293b;border-radius:14px;padding:18px;margin-bottom:16px;border:1px solid #334155}
.adm-section h3{font-size:15px;color:#60a5fa;margin-bottom:12px}
.guide-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #334155}
.guide-step:last-child{border:none}
.guide-num{flex-shrink:0;width:28px;height:28px;background:#3b82f6;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.guide-text{font-size:13px;line-height:1.7;color:#cbd5e1}
.guide-text b{color:#60a5fa}
.kakao-msg{background:#0f172a;border-radius:10px;padding:14px;margin:10px 0;font-size:13px;line-height:1.8;color:#fbbf24;border:1px dashed #92400e;word-break:keep-all}
.copy-btn{display:inline-block;padding:6px 14px;background:#334155;color:#e2e8f0;border:none;border-radius:8px;font-size:12px;cursor:pointer;margin-top:6px}
.footer-btns{position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:1px solid #334155;padding:10px 16px;display:flex;gap:8px;justify-content:center;z-index:50}
.footer-btns .btn{flex:1;max-width:280px;padding:12px;font-size:14px}
.hidden{display:none!important}
</style>
</head>

// ── 문제 데이터 ──
const Q = [

  // ═══════════════════════════════════════════

    o:["조기 이상(가능한 빨리 침대에서 일어나 움직이기)을 격려한다",

  {

  <div class="admin-panel">
    <div class="header">
      <h1>관리자 모드</h1>
      <p>시험 운영 관리</p>
    </div>
    <div id="admContent"></div>
    <button class="btn btn-secondary" onclick="hideAdmin()">← 메인으로 돌아가기</button>
  </div>
</div>

<script>
let userName="";
let answers=new Array(TOTAL).fill(0);
let submitted=false;

// ── 시험 시작 ──
function startExam(){
  var n=document.getElementById("nameInput").value.trim();
  if(!n){alert("이름을 입력해 주세요.");return}
  userName=n;

  // 저장된 결과 확인
  var saved=localStorage.getItem("exam_comp1_"+userName);
  if(saved){
    var d=JSON.parse(saved);
    answers=d.answers;
    submitted=true;
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("lockScreen").classList.remove("hidden");
    return;
  }

  buildExam();
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("examScreen").classList.remove("hidden");
  updateProgress();
}

function buildExam(){
  var h="";
  var si=0;
  Q.forEach(function(q,i){
    if(si<SECS.length && (i+1)===SECS[si].s){
      h+='<div class="section-title">'+SECS[si].t+'</div>';
      si++;
    }
    h+='<div class="q-card" id="q'+i+'">';
    h+='<span class="q-num">'+(i+1)+'번</span>';
    h+='<div class="q-text">'+q.q.replace(/\n/g,"<br>")+'</div>';
    h+='<div class="opt-list">';
    q.o.forEach(function(o,j){
      h+='<div class="opt-btn" data-q="'+i+'" data-o="'+(j+1)+'" onclick="selectOpt(this,'+i+','+(j+1)+')">';
      h+='<span class="opt-circle">'+C[j]+'</span>';
      h+='<span>'+o+'</span></div>';
    });
    h+='</div></div>';
  });
  document.getElementById("examBody").innerHTML=h;
}

function selectOpt(el,qi,oi){
  if(submitted)return;
  var opts=el.parentElement.children;
  for(var k=0;k<opts.length;k++)opts[k].classList.remove("selected");
  el.classList.add("selected");
  answers[qi]=oi;
  updateProgress();
}

function updateProgress(){
  var answered=answers.filter(function(a){return a>0}).length;
  var pct=(answered/TOTAL*100).toFixed(0);
  document.getElementById("progBar").style.width=pct+"%";
  document.getElementById("progInfo").textContent=answered+" / "+TOTAL+" 문항 응답 완료";
}

// ── 답안 제출 ──
function submitExam(){
  var answered=answers.filter(function(a){return a>0}).length;
  var unanswered=TOTAL-answered;
  var msg="총 "+TOTAL+"문항 중 "+answered+"문항 응답하셨습니다.";
  if(unanswered>0)msg+="\n미응답 "+unanswered+"문항이 있습니다.";
  msg+="\n\n제출하시겠습니까? 제출 후에는 수정할 수 없습니다.";
  if(!confirm(msg))return;

  submitted=true;
  localStorage.setItem("exam_comp1_"+userName,JSON.stringify({answers:answers,time:new Date().toISOString()}));

  document.getElementById("examScreen").classList.add("hidden");
  document.getElementById("lockScreen").classList.remove("hidden");
  document.getElementById("progBar").style.width="100%";
}

// ── 결과 잠금 해제 ──
function tryUnlock(){
  var code=document.getElementById("unlockInput").value.trim();
  if(code===UNLOCK_CODE){
    showResult();
  }else{
    document.getElementById("lockMsg").textContent="코드가 일치하지 않습니다. 다시 입력해 주세요.";
    document.getElementById("lockMsg").style.color="#ef4444";
  }
}

// ── 결과 표시 ──
function showResult(){
  document.getElementById("lockScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");

  var correct=0;
  answers.forEach(function(a,i){if(a===ANS[i])correct++});
  var score=Math.round(correct/TOTAL*100);
  var pass=correct>=PASS_SCORE;

  var h='<div class="result-header">';
  h+='<div class="score-circle '+(pass?"pass":"fail")+'">'+score+'<small>점</small></div>';
  h+='<div class="result-badge '+(pass?"pass":"fail")+'">'+(pass?"🎉 합격":"불합격")+'</div>';
  h+='<p style="font-size:14px;color:#94a3b8;margin-top:4px">'+userName+'님의 시험 결과</p>';
  h+='<div class="stat-row">';
  h+='<div class="stat-item"><div class="num correct-mark">'+correct+'</div><div class="lbl">정답</div></div>';
  h+='<div class="stat-item"><div class="num wrong-mark">'+(TOTAL-correct)+'</div><div class="lbl">오답</div></div>';
  h+='<div class="stat-item"><div class="num" style="color:#60a5fa">'+TOTAL+'</div><div class="lbl">총 문항</div></div>';
  h+='</div></div>';

  // 절별 문제 표시
  var si=0;
  Q.forEach(function(q,i){
    if(si<SECS.length && (i+1)===SECS[si].s){
      h+='<div class="section-title">'+SECS[si].t+'</div>';
      si++;
    }
    var mine=answers[i];
    var ans=ANS[i];
    var isCorrect=mine===ans;
    var icon=mine===0?"⚠️":(isCorrect?"✅":"❌");

    h+='<div class="r-q">';
    h+='<span class="q-num">'+(i+1)+'번 '+icon+'</span>';
    if(mine===0)h+='<span class="unanswered-badge">미응답</span>';
    h+='<div class="q-text" style="margin-top:10px">'+q.q.replace(/\n/g,"<br>")+'</div>';

    q.o.forEach(function(o,j){
      var cls="opt-row";
      if(j+1===ans)cls+=" is-answer";
      else if(j+1===mine && mine!==ans)cls+=" is-wrong";
      h+='<div class="'+cls+'">'+C[j]+' '+o+'</div>';
    });

    h+='<div class="explain-box"><b>💡 해설:</b> '+q.e+'</div>';
    h+='</div>';
  });

  // 다시 풀기 버튼
  h+='<div style="padding:20px 0;text-align:center">';
  h+='<button class="btn btn-secondary" onclick="resetExam()" style="max-width:300px;margin:0 auto">🔄 다시 풀기</button>';
  h+='</div>';

  document.getElementById("resultScreen").innerHTML=h;
}

function resetExam(){
  if(!confirm("저장된 결과를 삭제하고 처음부터 다시 풀겠습니까?"))return;
  localStorage.removeItem("exam_comp1_"+userName);
  location.reload();
}

// ── 관리자 모드 ──
function showAdmin(){
  var pw=prompt("관리자 비밀번호를 입력하세요:");
  if(pw!==ADMIN_PW){if(pw!==null)alert("비밀번호가 일치하지 않습니다.");return}

  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("adminScreen").classList.remove("hidden");

  var h="";

  // 운영 가이드
  h+='<div class="adm-section"><h3>📋 시험 운영 가이드</h3>';
  h+='<div class="guide-step"><div class="guide-num">1</div><div class="guide-text"><b>시험 전</b> — index.html 파일을 GitHub Pages 또는 Netlify Drop에 업로드한 뒤, 생성된 링크를 카카오톡 단체방에 공유합니다.</div></div>';
  h+='<div class="guide-step"><div class="guide-num">2</div><div class="guide-text"><b>시험 중</b> — 교육생들이 링크를 터치하여 이름 입력 후 시험에 응시합니다.</div></div>';
  h+='<div class="guide-step"><div class="guide-num">3</div><div class="guide-text"><b>시험 후</b> — 아래 카카오톡 안내 문구를 단체방에 전송합니다.</div></div>';
  h+='</div>';

  // 카톡 문구
  h+='<div class="adm-section"><h3>💬 카카오톡 발송 문구</h3>';
  h+='<p style="font-size:12px;color:#94a3b8;margin-bottom:8px">아래 문구를 복사하여 카카오톡에 붙여넣기 하세요</p>';

  var kakaoMsg1="\uD83D\uDCDD 1차 종합 모의고사 안내\n\n아래 링크를 터치하여 시험에 응시해 주세요.\n이름을 입력하신 후 시험이 시작됩니다.\n\n\u23F0 시험 시간: 제한 없음\n\uD83D\uDCCC 총 60문항 (제5장~제7장 기출 종합)\n\u2705 60점 이상 합격\n\n\uD83D\uDC49 시험 링크: (여기에 링크 붙여넣기)";
  h+='<div class="kakao-msg" id="kakao1">'+kakaoMsg1.replace(/\n/g,"<br>")+'</div>';
  h+='<button class="copy-btn" onclick="copyKakao1()">📋 복사하기</button>';

  var kakaoMsg2="\u2705 시험이 종료되었습니다.\n\n결과확인 코드: "+UNLOCK_CODE+"\n\n제출 화면에서 위 코드를 입력하면\n점수와 해설을 확인할 수 있습니다.\n\n60문항 중 "+PASS_SCORE+"문항(60점) 이상이면 합격입니다.";
  h+='<div class="kakao-msg" id="kakao2" style="margin-top:16px">'+kakaoMsg2.replace(/\n/g,"<br>")+'</div>';
  h+='<button class="copy-btn" onclick="copyKakao2()">📋 복사하기</button>';
  h+='</div>';

  // CONFIG 수정 안내
  h+='<div class="adm-section"><h3>⚙️ 문제 수정 방법</h3>';
  h+='<div class="guide-step"><div class="guide-num">1</div><div class="guide-text">index.html 파일을 <b>메모장</b> 또는 코드 편집기로 엽니다.</div></div>';
  h+='<div class="guide-step"><div class="guide-num">2</div><div class="guide-text">파일 상단 <b>CONFIG 영역</b>에서 비밀번호, 코드, 정답, 문제 데이터를 수정합니다.</div></div>';
  h+='<div class="guide-step"><div class="guide-num">3</div><div class="guide-text">수정 후 저장하고 <b>GitHub</b> 또는 <b>Netlify Drop</b>에 다시 업로드하면 즉시 반영됩니다.</div></div>';
  h+='</div>';

  // 정답표
  h+='<div class="adm-section"><h3>📊 정답표 (60문항)</h3><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:10px">';
  ANS.forEach(function(a,i){
    h+='<div style="text-align:center;padding:6px 0;background:#0f172a;border-radius:8px;font-size:12px"><span style="color:#64748b">'+(i+1)+'.</span> <span style="color:#60a5fa;font-weight:700">'+C[a-1]+'</span></div>';
  });
  h+='</div></div>';

  document.getElementById("admContent").innerHTML=h;
}

function hideAdmin(){
  document.getElementById("adminScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}

function copyKakao1(){
  var t="\uD83D\uDCDD 1차 종합 모의고사 안내\n\n아래 링크를 터치하여 시험에 응시해 주세요.\n이름을 입력하신 후 시험이 시작됩니다.\n\n\u23F0 시험 시간: 제한 없음\n\uD83D\uDCCC 총 60문항 (제5장~제7장 기출 종합)\n\u2705 60점 이상 합격\n\n\uD83D\uDC49 시험 링크: (여기에 링크 붙여넣기)";
  copyText(t);
}

function copyKakao2(){
  var t="\u2705 시험이 종료되었습니다.\n\n결과확인 코드: "+UNLOCK_CODE+"\n\n제출 화면에서 위 코드를 입력하면\n점수와 해설을 확인할 수 있습니다.\n\n60문항 중 "+PASS_SCORE+"문항(60점) 이상이면 합격입니다.";
  copyText(t);
}

function copyText(t){
  navigator.clipboard.writeText(t).then(function(){alert("복사되었습니다!")}).catch(function(){
    var ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("복사되었습니다!");
  });
}
</script>
</body>
</html>
