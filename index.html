<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>요양보호사 1차 모의고사</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕",sans-serif;min-height:100vh;padding-bottom:80px}
.container{max-width:600px;margin:0 auto;padding:16px}
.header{text-align:center;padding:24px 0 16px}
.header h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.4}
.header p{font-size:13px;color:#94a3b8;margin-top:6px}
.card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #334155}
.card h2{font-size:15px;color:#60a5fa;margin-bottom:12px;font-weight:700}
.input-wrap{margin-bottom:12px}
.input-wrap label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.input-wrap input{width:100%;padding:14px 16px;background:#0f172a;border:2px solid #334155;border-radius:12px;color:#e2e8f0;font-size:16px;outline:none;transition:border-color .2s}
.input-wrap input:focus{border-color:#60a5fa}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:#334155;color:#e2e8f0;margin-top:8px}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}
.section-title{background:#1e3a5f;border-radius:12px;padding:14px 16px;margin:20px 0 12px;font-size:14px;font-weight:700;color:#93c5fd;border-left:4px solid #3b82f6}
.q-card{background:#1e293b;border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid #334155}
.q-num{font-size:13px;font-weight:800;color:#60a5fa;display:flex;align-items:center;gap:6px}
.q-text{font-size:14px;line-height:1.8;margin:10px 0 14px;color:#e2e8f0;word-break:keep-all}
.opt-list{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:block;width:100%;padding:12px 14px;background:#0f172a;border:2px solid #334155;border-radius:10px;color:#cbd5e1;font-size:13px;text-align:left;cursor:pointer;transition:all .15s;line-height:1.6;word-break:keep-all}
.opt-btn.selected{border-color:#3b82f6;background:#172554;color:#93c5fd}
.progress-info{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-size:13px;color:#94a3b8;position:sticky;top:0;background:#0f172a;z-index:10}
.progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);z-index:100;transition:width .3s}
.submit-area{padding:20px 0;text-align:center}
.result-header{text-align:center;padding:24px 0}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;font-size:40px;font-weight:900;border:4px solid}
.score-circle.pass{border-color:#22c55e;color:#22c55e;background:rgba(34,197,94,.1)}
.score-circle.fail{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.1)}
.score-circle small{font-size:14px;font-weight:400}
.result-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-size:15px;font-weight:700}
.result-badge.pass{background:rgba(34,197,94,.15);color:#22c55e}
.result-badge.fail{background:rgba(239,68,68,.15);color:#ef4444}
.stat-row{display:flex;justify-content:center;gap:24px;margin-top:16px}
.stat-item{text-align:center}
.stat-item .num{font-size:24px;font-weight:800}
.stat-item .lbl{font-size:12px;color:#94a3b8;margin-top:2px}
.correct-mark{color:#22c55e}
.wrong-mark{color:#ef4444}
.r-q{background:#1e293b;border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid #334155}
.opt-row{padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.6;margin:4px 0;color:#94a3b8;word-break:keep-all}
.opt-row.is-answer{background:rgba(34,197,94,.12);color:#22c55e;font-weight:600;border:1px solid rgba(34,197,94,.3)}
.opt-row.is-wrong{background:rgba(239,68,68,.1);color:#ef4444;text-decoration:line-through;border:1px solid rgba(239,68,68,.2)}
.explain-box{background:#0c1a2e;border-left:3px solid #3b82f6;border-radius:0 8px 8px 0;padding:14px;margin-top:12px;font-size:13px;line-height:1.8;color:#94a3b8;word-break:keep-all}
.unanswered-badge{background:rgba(245,158,11,.15);color:#f59e0b;font-size:11px;padding:2px 8px;border-radius:4px;margin-left:8px}
.lock-screen{text-align:center;padding:60px 20px}
.lock-screen .icon{font-size:48px;margin-bottom:16px}
.lock-input{width:200px;padding:14px;background:#0f172a;border:2px solid #334155;border-radius:12px;color:#e2e8f0;font-size:20px;text-align:center;letter-spacing:8px;outline:none;margin:0 auto;display:block}
.lock-input:focus{border-color:#60a5fa}
.lock-msg{font-size:13px;margin-top:8px;min-height:20px}
.admin-panel{max-width:600px;margin:0 auto;padding:16px}
.adm-section{background:#1e293b;border-radius:14px;padding:18px;margin-bottom:16px;border:1px solid #334155}
.adm-section h3{font-size:15px;color:#60a5fa;margin-bottom:12px}
.guide-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #334155}
.guide-step:last-child{border:none}
.guide-num{flex-shrink:0;width:28px;height:28px;background:#3b82f6;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.guide-text{font-size:13px;line-height:1.7;color:#cbd5e1}
.guide-text b{color:#60a5fa}
.kakao-msg{background:#0f172a;border-radius:10px;padding:14px;margin:10px 0;font-size:13px;line-height:1.8;color:#fbbf24;border:1px dashed #92400e;word-break:keep-all}
.copy-btn{display:inline-block;padding:6px 14px;background:#334155;color:#e2e8f0;border:none;border-radius:8px;font-size:12px;cursor:pointer;margin-top:6px}
.hidden{display:none!important}
</style>
</head>

<script>

const ADMIN_PW = "admin2025";

  3,1,5,4,3, 2,4,1,5,3,  // 41~50 (6장~7장)

const SECS = [

  {t:"제6장 치매·뇌졸중·파킨슨 질환 (21~44번)", s:21, e:44},
  {t:"제7장 노인의 건강증진 및 질병예방 (45~60번)", s:45, e:60}

// ── 문제 데이터 ──
const Q = [
  // ═══════════════════════════════════════════
  // 제5장: 노화에 따른 변화와 질환 (1~20번)
  // ═══════════════════════════════════════════
  {
    q:"70세 남성이 야간에 소변을 보려고 일어나다 갑자기 어지러워 주저앉았다. 이 증상의 주된 원인으로 가장 적절한 것은?",
    o:["심부전으로 인한 부종","뇌졸중에 의한 편마비","기립성 저혈압에 의한 뇌 혈류 감소","당뇨병에 의한 저혈당","전립선 비대증에 의한 요폐"],
    e:"노인은 자율신경계 기능 저하로 체위 변경 시 혈압 조절이 원활하지 않아 기립성 저혈압이 발생하기 쉽습니다. 누운 상태에서 갑자기 일어서면 중력에 의해 혈액이 하지로 쏠리면서 뇌로 가는 혈류가 일시적으로 감소하여 어지러움·실신이 나타납니다. 야간 배뇨 시 특히 발생 빈도가 높으며, 천천히 단계적으로(눕기→앉기→서기) 일어나도록 교육해야 합니다."
  },
  {
    q:"노화에 따른 신경계 변화로 옳은 것은?",
    o:["뇌세포 수가 증가한다","반사 반응 시간이 빨라진다","수면 중 각성 횟수가 감소한다","깊은 수면(서파 수면)이 감소한다","단기 기억력이 향상된다"],
    e:"노화가 진행되면 뇌 신경세포가 감소하고 뇌 무게가 줄어들며, 신경전달물질의 분비가 저하됩니다. 이에 따라 깊은 수면(서파 수면)이 감소하여 야간 각성 횟수가 증가하고, 반사 반응 시간이 느려지며, 단기 기억력이 저하됩니다. 다만 장기 기억력은 비교적 유지됩니다."
  },
  {
    q:"76세 여성이 허리 통증과 함께 키가 5cm 줄었다고 호소하였다. 이 증상과 가장 관련이 깊은 질환은?",
    o:["류마티스 관절염","골다공증에 의한 척추 압박골절","퇴행성 관절염","근감소증","추간판 탈출증"],
    e:"골다공증이 진행되면 척추체의 골밀도가 감소하여 체중 부하만으로도 척추 압박골절이 발생할 수 있습니다. 척추체가 납작하게 찌그러지면서 신장이 줄어들고 등이 둥글게 굽는 척추 후만증(꼬부랑 허리)이 나타납니다. 폐경 후 여성은 에스트로겐 감소로 골다공증 위험이 특히 높으므로 칼슘·비타민D 보충과 체중 부하 운동이 중요합니다."
  },
  {
    q:"노화에 따른 비뇨기계 변화에 대한 설명으로 옳은 것은?",

  },
  {
    q:"68세 대상자가 식후 30분 뒤 명치 부위의 쓰림과 신트림을 반복적으로 호소하고 있다. 이 증상을 완화하기 위한 생활습관 관리로 가장 적절한 것은?",

    e:"위식도 역류질환은 위산이 식도로 역류하여 명치 쓰림, 신트림 등이 나타나는 질환입니다. 식후 바로 눕지 않고 최소 2~3시간 상체를 세운 자세를 유지하면 중력에 의해 위산의 역류를 줄일 수 있습니다. 소량씩 자주 섭취하고, 취침 전 음식 섭취를 피하며, 복부를 압박하는 옷이나 복대 착용을 피하고, 자극적인 음식·카페인·알코올을 제한해야 합니다."
  },
  {
    q:"노화에 따른 피부계 변화에 대한 설명으로 옳지 않은 것은?",

    e:"빈혈은 적혈구(헤모글로빈) 부족으로 산소 운반 능력이 저하되는 질환입니다. ㄱ. 산소 공급 부족으로 어지러움과 피로감이 나타납니다. ㄴ. 부족한 산소를 보상하기 위해 심장이 빠르게 뛰어 심박동수가 증가합니다. ㄹ. 혈액 내 헤모글로빈 감소로 피부와 결막이 창백해집니다. ㄷ은 빈혈의 증상이 아니며, 오히려 감염이나 열성 질환에서 나타나는 증상입니다."

    e:"고혈압 대상자에게는 DASH 식이(Dietary Approaches to Stop Hypertension)가 권장됩니다. 저지방 유제품, 채소, 과일, 통곡물 위주의 식이를 하고, 나트륨(소금) 섭취를 하루 6g 이하로 제한해야 합니다. 칼륨은 나트륨 배출을 도와 혈압을 낮추는 데 도움이 되므로 바나나·감자 등 칼륨이 풍부한 음식을 적절히 섭취해야 합니다. 알코올은 혈압을 상승시키므로 절주가 필요합니다."

    o:["건강검진은 증상이 나타난 후에만 받는다","노인은 건강검진의 효과가 없으므로 불필요하다","정기적인 건강검진을 통해 질병을 조기에 발견하고 관리할 수 있다","혈압 측정은 1년에 1회만 하면 충분하다","암 검진은 40세 이전에만 필요하다"],
    e:"정기적인 건강검진은 만성질환(고혈압, 당뇨, 암 등)을 조기에 발견하여 치료 시기를 놓치지 않고 합병증을 예방하는 데 매우 중요합니다. 노인은 여러 만성질환이 동시에 발생할 수 있으며, 초기에는 증상이 뚜렷하지 않은 경우가 많으므로 증상이 없더라도 정기 검진을 받아야 합니다. 혈압은 가능하면 매일 측정하는 것이 좋고, 암 검진은 국가 암 검진 프로그램에 따라 연령별로 권장됩니다."
  },
  {
    q:"노인에게 나타나는 탈수 증상으로 옳은 것을 모두 고른 것은?\n ㄱ. 입과 혀가 마르고 피부 탄력이 감소한다\n ㄴ. 소변량이 감소하고 소변 색이 짙어진다\n ㄷ. 혈압이 상승하고 맥박이 느려진다\n ㄹ. 어지러움과 혼란 증상이 나타난다",
    o:["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],
    e:"ㄱ. 탈수 시 체내 수분이 부족하여 구강 점막이 마르고 피부 탄력(turgor)이 감소합니다. ㄴ. 신장에서 수분을 재흡수하려 하므로 소변량이 줄고 색이 짙어집니다. ㄹ. 혈액량 감소로 뇌 혈류가 줄어 어지러움과 혼란이 나타납니다. ㄷ은 틀린 설명으로, 탈수 시에는 혈압이 하강하고 맥박이 빨라집니다(빈맥). 노인은 갈증 반응이 둔하여 탈수를 자각하기 어려우므로 주의 깊은 관찰이 필요합니다."
  }
];

// ── 선택지 원형 번호 ──
const C = ["①","②","③","④","⑤"];
</script>

<div class="progress-bar" id="progBar"></div>

<!-- ── 시작 화면 ── -->
<div id="startScreen" class="container">
  <div class="header">
    <h1>요양보호사 양성과정<br>1차 종합 모의고사</h1>
    <p>제5장~제7장 | 60문항 | 고급 난이도</p>
  </div>
  <div class="card">
    <h2>응시자 정보</h2>
    <div class="input-wrap">
      <label>이름을 입력하세요</label>
      <input type="text" id="nameInput" placeholder="홍길동" autocomplete="off">
    </div>
    <button class="btn btn-primary" onclick="startExam()">시험 시작</button>
  </div>
  <button class="btn btn-secondary" onclick="showAdmin()">관리자 모드</button>
</div>

<!-- ── 시험 화면 ── -->
<div id="examScreen" class="container hidden">
  <div class="progress-info" id="progInfo"></div>
  <div id="examBody"></div>
  <div class="submit-area">
    <button class="btn btn-danger" id="submitBtn" onclick="submitExam()">답안 제출</button>
  </div>
</div>

<!-- ── 결과 잠금 화면 ── -->
<div id="lockScreen" class="container hidden">
  <div class="lock-screen">
    <div class="icon">🔒</div>
    <h2 style="font-size:18px;margin-bottom:8px">답안이 제출되었습니다</h2>
    <p style="font-size:14px;color:#94a3b8;margin-bottom:20px">결과를 확인하려면 결과확인 코드를 입력하세요</p>
    <input type="text" class="lock-input" id="unlockInput" placeholder="코드" maxlength="10" inputmode="numeric">
    <button class="btn btn-primary" style="width:200px;margin:12px auto" onclick="tryUnlock()">결과 확인</button>
    <p class="lock-msg" id="lockMsg"></p>
    <p style="font-size:12px;color:#475569;margin-top:20px">시험 종료 후 관리자가 카카오톡에<br>결과확인 코드를 안내합니다</p>
  </div>
</div>

<!-- ── 결과 화면 ── -->
<div id="resultScreen" class="container hidden"></div>

<!-- ── 관리자 화면 ── -->
<div id="adminScreen" class="hidden">
  <div class="admin-panel">
    <div class="header">
      <h1>관리자 모드</h1>
      <p>1차 종합 모의고사 운영 관리</p>
    </div>
    <div id="admContent"></div>
    <button class="btn btn-secondary" onclick="hideAdmin()">← 메인으로 돌아가기</button>
  </div>
</div>

<script>
let userName="";
let answers=new Array(TOTAL).fill(0);
let submitted=false;

function startExam(){
  const n=document.getElementById("nameInput").value.trim();
  if(!n){alert("이름을 입력해 주세요.");return}
  userName=n;
  const saved=localStorage.getItem("exam1st_"+userName);
  if(saved){
    const d=JSON.parse(saved);
    answers=d.answers;submitted=true;
    showLock();return;
  }
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("examScreen").classList.remove("hidden");
  renderExam();
}

function renderExam(){
  let h="";let si=0;
  Q.forEach((q,i)=>{
    if(si<SECS.length&&(i+1)===SECS[si].s){h+=`<div class="section-title">${SECS[si].t}</div>`;si++}
    h+=`<div class="q-card" id="q${i}"><div class="q-num">${i+1}번</div>`;
    h+=`<div class="q-text">${q.q.replace(/\n/g,"<br>")}</div><div class="opt-list">`;
    q.o.forEach((o,j)=>{
      h+=`<button class="opt-btn" data-q="${i}" data-o="${j+1}" onclick="pickOpt(this)">${C[j]} ${o}</button>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById("examBody").innerHTML=h;
  updateProgress();
}

function pickOpt(el){
  if(submitted)return;
  const qi=+el.dataset.q,oi=+el.dataset.o;
  answers[qi]=oi;
  document.querySelectorAll(`.opt-btn[data-q="${qi}"]`).forEach(b=>b.classList.remove("selected"));
  el.classList.add("selected");
  updateProgress();
}

function updateProgress(){
  const done=answers.filter(a=>a>0).length;
  document.getElementById("progInfo").innerHTML=`<span>${userName}님</span><span>${done}/${TOTAL} 응답</span>`;
  document.getElementById("progBar").style.width=(done/TOTAL*100)+"%";
}

function submitExam(){
  const unanswered=answers.filter(a=>a===0).length;
  let msg=`총 ${TOTAL}문항 중 ${TOTAL-unanswered}문항에 응답하셨습니다.`;
  if(unanswered>0)msg+=`\n⚠️ ${unanswered}문항이 미응답입니다.`;
  msg+="\n\n답안을 제출하시겠습니까?\n제출 후에는 수정할 수 없습니다.";
  if(!confirm(msg))return;
  submitted=true;
  localStorage.setItem("exam1st_"+userName,JSON.stringify({answers,ts:Date.now()}));
  showLock();
}

function showLock(){
  document.getElementById("examScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("lockScreen").classList.remove("hidden");
}

function tryUnlock(){
  const code=document.getElementById("unlockInput").value.trim();
  if(code===UNLOCK_CODE){showResult();return}
  document.getElementById("lockMsg").textContent="코드가 일치하지 않습니다. 다시 입력해 주세요.";
  document.getElementById("lockMsg").style.color="#ef4444";
}

function showResult(){
  document.getElementById("lockScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");
  let correct=0;
  answers.forEach((a,i)=>{if(a===ANS[i])correct++});
  const score=Math.round(correct/TOTAL*100);
  const pass=correct>=PASS_SCORE;
  let h=`<div class="result-header">`;
  h+=`<div class="score-circle ${pass?"pass":"fail"}">${score}<small>점</small></div>`;
  h+=`<div class="result-badge ${pass?"pass":"fail"}">${pass?"🎉 합격":"불합격"}</div>`;
  h+=`<p style="font-size:14px;color:#94a3b8;margin-top:4px">${userName}님의 시험 결과</p>`;
  h+=`<div class="stat-row">`;
  h+=`<div class="stat-item"><div class="num correct-mark">${correct}</div><div class="lbl">정답</div></div>`;
  h+=`<div class="stat-item"><div class="num wrong-mark">${TOTAL-correct}</div><div class="lbl">오답</div></div>`;
  h+=`<div class="stat-item"><div class="num" style="color:#60a5fa">${TOTAL}</div><div class="lbl">총 문항</div></div>`;
  h+=`</div></div>`;
  let si=0;
  Q.forEach((q,i)=>{
    if(si<SECS.length&&(i+1)===SECS[si].s){h+=`<div class="section-title">${SECS[si].t}</div>`;si++}
    const mine=answers[i],ans=ANS[i],isCorrect=mine===ans;
    const icon=mine===0?"⚠️":(isCorrect?"✅":"❌");
    h+=`<div class="r-q"><span class="q-num">${i+1}번 ${icon}</span>`;
    if(mine===0)h+=`<span class="unanswered-badge">미응답</span>`;
    h+=`<div class="q-text" style="margin-top:10px">${q.q.replace(/\n/g,"<br>")}</div>`;
    q.o.forEach((o,j)=>{
      let cls="opt-row";
      if(j+1===ans)cls+=" is-answer";
      else if(j+1===mine&&mine!==ans)cls+=" is-wrong";
      h+=`<div class="${cls}">${C[j]} ${o}</div>`;
    });
    h+=`<div class="explain-box"><b>💡 해설:</b> ${q.e}</div></div>`;
  });
  h+=`<div style="padding:20px 0;text-align:center"><button class="btn btn-secondary" onclick="resetExam()" style="max-width:300px;margin:0 auto">🔄 다시 풀기</button></div>`;
  document.getElementById("resultScreen").innerHTML=h;
}

function resetExam(){
  if(!confirm("저장된 결과를 삭제하고 처음부터 다시 풀겠습니까?"))return;
  localStorage.removeItem("exam1st_"+userName);
  location.reload();
}

function showAdmin(){
  const pw=prompt("관리자 비밀번호를 입력하세요:");
  if(pw!==ADMIN_PW){if(pw!==null)alert("비밀번호가 일치하지 않습니다.");return}
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("adminScreen").classList.remove("hidden");
  let h="";
  h+=`<div class="adm-section"><h3>📋 시험 운영 가이드</h3>`;
  h+=`<div class="guide-step"><div class="guide-num">1</div><div class="guide-text"><b>시험 전</b> — index.html 파일을 GitHub Pages 또는 Netlify Drop에 업로드한 뒤, 생성된 링크를 카카오톡 단체방에 공유합니다.</div></div>`;
  h+=`<div class="guide-step"><div class="guide-num">2</div><div class="guide-text"><b>시험 중</b> — 교육생들이 링크를 터치하여 이름 입력 후 시험에 응시합니다.</div></div>`;
  h+=`<div class="guide-step"><div class="guide-num">3</div><div class="guide-text"><b>시험 후</b> — 아래 카카오톡 안내 문구를 단체방에 전송합니다.</div></div></div>`;

  const kakaoMsg1=`📝 1차 종합 모의고사 안내\n\n아래 링크를 터치하여 시험에 응시해 주세요.\n이름을 입력하신 후 시험이 시작됩니다.\n\n⏰ 시험 시간: 제한 없음\n📌 총 60문항 (제5장~제7장 종합)\n✅ 60점 이상 합격\n\n👉 시험 링크: (여기에 링크 붙여넣기)`;
  const kakaoMsg2=`✅ 시험이 종료되었습니다.\n\n결과확인 코드: ${UNLOCK_CODE}\n\n제출 화면에서 위 코드를 입력하면\n점수와 해설을 확인할 수 있습니다.\n\n60문항 중 ${PASS_SCORE}문항(60점) 이상이면 합격입니다.`;

  h+=`<div class="adm-section"><h3>💬 카카오톡 발송 문구</h3>`;
  h+=`<p style="font-size:12px;color:#94a3b8;margin-bottom:8px">아래 문구를 복사하여 카카오톡에 붙여넣기 하세요</p>`;
  h+=`<div class="kakao-msg">${kakaoMsg1.replace(/\n/g,"<br>")}</div>`;
  h+=`<button class="copy-btn" onclick="copyText(\`${kakaoMsg1}\`)">📋 시험 안내 복사</button>`;
  h+=`<div class="kakao-msg" style="margin-top:16px">${kakaoMsg2.replace(/\n/g,"<br>")}</div>`;
  h+=`<button class="copy-btn" onclick="copyText(\`${kakaoMsg2}\`)">📋 결과 안내 복사</button></div>`;

  h+=`<div class="adm-section"><h3>📊 정답표 (60문항)</h3><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:10px">`;
  ANS.forEach((a,i)=>{
    h+=`<div style="text-align:center;padding:6px 0;background:#0f172a;border-radius:8px;font-size:12px"><span style="color:#64748b">${i+1}.</span> <span style="color:#60a5fa;font-weight:700">${C[a-1]}</span></div>`;
  });
  h+=`</div></div>`;

  document.getElementById("admContent").innerHTML=h;
}

function hideAdmin(){
  document.getElementById("adminScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}

function copyText(t){
  navigator.clipboard.writeText(t).then(()=>alert("복사되었습니다!")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);
    ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("복사되었습니다!");
  });
}
</script>
</body>
</html>
